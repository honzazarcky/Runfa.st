<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111114"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="url(#bg2)" rx="0"/>
  <!-- Status bar -->
  <text x="30" y="58" fill="rgba(255,255,255,0.5)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="600">9:41</text>
  <!-- Title -->
  <text x="24" y="120" fill="#fff" font-family="-apple-system,system-ui,sans-serif" font-size="28" font-weight="700">Coach</text>
  
  <!-- Coach message 1 -->
  <rect x="24" y="170" width="280" height="90" rx="18" fill="rgba(255,255,255,0.06)"/>
  <text x="40" y="196" fill="rgba(255,255,255,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="400">Great tempo run yesterday! Your</text>
  <text x="40" y="216" fill="rgba(255,255,255,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="400">pace is trending down nicely.</text>
  <text x="40" y="246" fill="rgba(255,255,255,0.3)" font-family="-apple-system,system-ui,sans-serif" font-size="11">2 min ago</text>
  
  <!-- User message -->
  <rect x="110" y="290" width="256" height="70" rx="18" fill="rgba(59,130,246,0.2)"/>
  <text x="126" y="318" fill="rgba(255,255,255,0.9)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="400">Thanks! My legs feel a bit</text>
  <text x="126" y="338" fill="rgba(255,255,255,0.9)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="400">heavy today though.</text>

  <!-- Coach message 2 -->
  <rect x="24" y="390" width="310" height="130" rx="18" fill="rgba(255,255,255,0.06)"/>
  <text x="40" y="418" fill="rgba(255,255,255,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="400">That's normal after back-to-back</text>
  <text x="40" y="438" fill="rgba(255,255,255,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="400">quality sessions. I'd recommend</text>
  <text x="40" y="458" fill="rgba(255,255,255,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="400">an easy 30-min recovery run</text>
  <text x="40" y="478" fill="rgba(255,255,255,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="400">today, or take it as a rest day.</text>
  <text x="40" y="508" fill="rgba(255,255,255,0.3)" font-family="-apple-system,system-ui,sans-serif" font-size="11">Just now</text>
  
  <!-- Weekly summary card -->
  <rect x="24" y="550" width="342" height="140" rx="16" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="40" y="580" fill="#3B82F6" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="700" letter-spacing="0.05em">WEEKLY SUMMARY</text>
  <text x="40" y="610" fill="#fff" font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="600">You're on track for your half</text>
  <text x="40" y="630" fill="#fff" font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="600">marathon in 8 weeks.</text>
  <text x="40" y="660" fill="rgba(255,255,255,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="13">28.5 km this week · Target: 32 km</text>
  <rect x="40" y="676" width="310" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="676" width="276" height="3" rx="1.5" fill="#3B82F6"/>

  <!-- Input area -->
  <rect x="24" y="770" width="342" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="44" y="799" fill="rgba(255,255,255,0.25)" font-family="-apple-system,system-ui,sans-serif" font-size="14">Ask your coach...</text>
</svg>
